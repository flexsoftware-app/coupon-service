spring.application.name=coupon-service
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/coupon_service}
spring.datasource.username=${DB_USERNAME:coupon}
spring.datasource.password=${DB_PASSWORD:coupon}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
security.trusted-proxies=${TRUSTED_PROXIES:127.0.0.1,::1}
